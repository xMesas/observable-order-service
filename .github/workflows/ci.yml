name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: "Tracing IT: real Zipkin, verifies actual multi-span trace linkage"
        run: ./mvnw -B test -Dtest=TracingIT

      - name: Package
        run: ./mvnw -B -DskipTests package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: observable-order-service-jar
          path: target/observable-order-service.jar
